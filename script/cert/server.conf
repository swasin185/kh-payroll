[ req ]
default_bits        = 2048
default_md          = sha256
distinguished_name  = server_dn
req_extensions      = req_ext
prompt              = no

[ server_dn ]
C  = TH
ST = Bangkok
L  = Bangkok
O  = Local Development Server
CN = localhost

[ req_ext ]
subjectAltName = @alt_names

[ alt_names ]
DNS.1   = localhost
DNS.2   = *.localhost
IP.1    = 127.0.0.1
IP.2    = ::1